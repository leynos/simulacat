name: Mutation testing

# Thin caller of the shared mutation-testing reusable workflow; caller
# guide: leynos/shared-actions docs/mutation-mutmut-workflow.md.
on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    permissions:
      contents: read
      id-token: write # OIDC workflow-source resolution
    uses: leynos/shared-actions/.github/workflows/mutation-mutmut.yml@dfddcb6cf53a2583e55bf0c3536c01ed1f67dc16
    with:
      # Flat package layout: mutable source lives in simulacat/, not src/
      # (src/ holds the TypeScript simulator, which mutmut cannot mutate).
      paths: "simulacat/"
      module-prefix-strip: ""
